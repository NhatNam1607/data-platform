name: Deploy Code Location - dagster_code

on:
  push:
    paths:
      - 'orchestration/**'
      - 'transformation/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/code-location-deploy.yml'
    branches:
      - main

env:
  IMAGE_NAME: dagster_code
  IMAGE_TAG: jayefee/dagster_code:latest

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout repo
        uses: actions/checkout@v4

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🛠️ Build and push dagster_code image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.IMAGE_TAG }}
          platforms: linux/amd64

      - name: ✍🏽 Generate .env file
        run: |
          echo "DAGSTER_POSTGRES_USER=${{ secrets.DB_USER }}" >> .env
          echo "DAGSTER_POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DAGSTER_POSTGRES_DB=${{ secrets.DB_NAME }}" >> .env
          echo "DAGSTER_CURRENT_IMAGE=${{ env.IMAGE_TAG }}" >> .env
          echo "DBT_POSTGRES_HOST=${{ secrets.DBT_POSTGRES_HOST }}" >> .env
          echo "DBT_POSTGRES_PORT=${{ secrets.DBT_POSTGRES_PORT }}" >> .env
          echo "DBT_POSTGRES_USER=${{ secrets.DBT_POSTGRES_USER }}" >> .env
          echo "DBT_POSTGRES_PASSWORD=${{ secrets.DBT_POSTGRES_PASSWORD }}" >> .env
          echo "DBT_POSTGRES_DBNAME=${{ secrets.DBT_POSTGRES_DBNAME }}" >> .env
          echo "DBT_POSTGRES_SCHEMA=${{ secrets.DBT_POSTGRES_SCHEMA }}" >> .env

      - name: 💻 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📦 Copy files to EC2
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml .env ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/dagster-deploy/

      - name: 🚀 SSH and deploy on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            cd dagster-deploy
            
            # Ensure the Docker network exists
            docker network inspect dagster-poc-network >/dev/null 2>&1 || docker network create dagster-poc-network

            docker compose pull dagster_code
            docker compose up -d dagster_code
          EOF